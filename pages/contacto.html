<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <title>Contacto | Armas Medievales</title>
</head>
<body>
    <header>
        <h1>
            <a href="../index.html">Armas Medievales</a>
        </h1>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="espadas.html">Espadas</a></li>
                <li><a href="armas-de-asta.html">Armas de Asta</a></li>
                <li><a href="armas-contundentes.html">Armas Contundentes</a></li>
                <li><a href="armas-a-distancia.html">Armas a Distancia</a></li>
                <li><a href="dagas-y-armas-cortas.html">Dagas y Armas Cortas</a></li>
                <li><a href="armas-especializadas.html">Armas Especializadas</a></li>
                <li><a href="armaduras-y-defensa.html">Armaduras y Defensa</a></li>
                <li><a href="armas-legendarias.html">Armas Legendarias</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form action="/submit" method="POST" class="container mt-4 col-md-5">

            <div class="mb-3">
                <label for="nombre-completo" class="form-label">Nombre completo:</label>
                <input type="text" name="nombre-completo" id="nombre-completo" class="form-control">
            </div>

            <div class="mb-3">
                <label for="correo" class="form-label">Correo electrónico:</label>
                <input type="email" name="correo" id="correo" class="form-control">
            </div>

            <fieldset class="mb-3">
                <legend class="form-label">Motivo de contacto:</legend>

                <div class="form-check">
                    <input type="radio" name="motivo" id="consulta" value="consulta" class="form-check-input">
                    <label for="consulta" class="form-check-label">Consulta</label>
                </div>

                <div class="form-check">
                    <input type="radio" name="motivo" id="sugerencia" value="sugerencia" class="form-check-input">
                    <label for="sugerencia" class="form-check-label">Sugerencia</label>
                </div>

                <div class="form-check">
                    <input type="radio" name="motivo" id="reclamo" value="reclamo" class="form-check-input">
                    <label for="reclamo" class="form-check-label">Reclamo</label>
                </div>
            </fieldset>

            <div class="mb-3">
                <label for="mensaje" class="form-label">Mensaje:</label>
                <textarea name="mensaje" id="mensaje" class="form-control" rows="4"></textarea>
            </div>
            <div class="text-center mb-3">
                <button type="submit" class="btn btn-primary">Enviar</button>
            </div>

        </form>

    </main>
    <footer>
        <p>
            <a href="contacto.html">Contacto</a>
            <a href="sobre-nosotros.html">Sobre nosotros</a>
            <a href="#">YouTube</a>
            <a href="#">Twitter</a>
            <a href="#">Instagram</a>
            <a href="#">Facebook</a>
        </p>
    </footer>
</body>
</html>
